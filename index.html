<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deanteria Fantasy Map</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="page-shell">
    <header>
      <div class="site-title">
        <h1>Deanteria Interactive Map</h1>
        <p>Drag to pan, wheel to zoom, hover markers for names.</p>
      </div>
      <div class="controls">
        <div class="zoom-controls" aria-label="Map controls">
          <button id="zoom-out" type="button" aria-label="Zoom out">-</button>
          <span id="zoom-level">100%</span>
          <button id="zoom-in" type="button" aria-label="Zoom in">+</button>
          <button id="reset" type="button" aria-label="Reset view">Reset</button>
        </div>
        <div class="legend" aria-label="Map legend">
          <strong>Legend</strong>
          <div class="legend-row">
            <span class="legend-badge legend-red"></span>
            <span>Capital / Stronghold</span>
          </div>
          <div class="legend-row">
            <span class="legend-badge legend-blue"></span>
            <span>Port / City</span>
          </div>
          <div class="legend-row">
            <span class="legend-badge legend-green"></span>
            <span>Mystical site / Ruins</span>
          </div>
        </div>
      </div>
    </header>

    <main>
      <div id="map-container">
        <div id="map-stage">
          <div id="map-layer">
            <img id="map-img" src="assets/map.svg" alt="Fantasy map of Deanteria" draggable="false" />
            <div id="overlay" aria-hidden="true"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
